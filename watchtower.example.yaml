# Watchtower — Example Configuration
#
# Copy this to watchtower.yaml and adjust for your environment.

server:
  listen_addr: "[::]:9090"
  max_recv_msg_size: 4194304   # 4 MB
  max_concurrent_streams: 100
  keepalive_interval: "30s"
  keepalive_timeout: "10s"
  enable_compression: true

  # TLS (optional). Uncomment to enable.
  # When tls_ca is also set, the server requires mTLS (client cert verification).
  # tls_cert: "/etc/watchtower/server.crt"
  # tls_key: "/etc/watchtower/server.key"
  # tls_ca: "/etc/watchtower/ca.crt"

pipeline:
  batch_size: 1024             # Records per batch sent to sinks
  flush_interval: "2s"         # Max time before flushing a partial batch
  buffer_size: 8192            # Bounded channel capacity (backpressure)
  workers: 2                   # Concurrent sink-delivery tasks

# Health check + Prometheus metrics HTTP server.
# Exposes /healthz, /readyz, and /metrics.
health:
  enabled: true
  listen_addr: "[::]:9091"

# Disk-backed spillover buffer. When the in-memory pipeline is full,
# batches are written here instead of being dropped. They are replayed
# on next startup or when capacity frees up.
spillover:
  enabled: false
  path: "/var/lib/watchtower/spillover.bin"

sinks:
  # --- Forward to a larger Watchtower aggregation instance ---
  - type: watchtower
    target: "watchtower-aggregator.internal:9090"
    enable_compression: true
    timeout: "10s"
    retry_attempts: 3
    retry_backoff: "1s"

  # --- Deliver directly to Elasticsearch ---
  # - type: elasticsearch
  #   addresses:
  #     - "https://es-node-1:9200"
  #     - "https://es-node-2:9200"
  #   index: "watchtower-logs"
  #   username: "elastic"
  #   password: "changeme"
  #   tls: true
  #   batch_size: 512
  #   flush_interval: "5s"
  #   retry_attempts: 3
  #   retry_backoff: "1s"

  # --- Deliver directly to OpenSearch ---
  # - type: opensearch
  #   addresses:
  #     - "https://opensearch-node-1:9200"
  #   index: "watchtower-logs"
  #   username: "admin"
  #   password: "admin"
  #   tls: true
  #   batch_size: 512
  #   flush_interval: "5s"
  #   retry_attempts: 3
  #   retry_backoff: "1s"

# Built-in log viewer. When enabled, Watchtower stores incoming logs in an
# embedded SQLite database and serves a web UI + JSON API to search them —
# so you can run with NO Elasticsearch/OpenSearch/forward sink at all.
viewer:
  enabled: false
  listen_addr: "127.0.0.1:9092"   # bind localhost by default; expose deliberately
  db_path: ":memory:"             # ephemeral; set a file path (e.g. /var/lib/watchtower/logs.db) to persist
  retention:
    max_records: 1000000          # trim oldest rows beyond this
    max_age: "7d"                 # delete rows older than this
  # auth:                         # optional HTTP basic auth on the viewer
  #   username: "admin"
  #   password: "changeme"
